<!DOCTYPE html>
<html>
<head>
    <title>Hostel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Hostel Management System</h1>

    <div class="card p-4 mb-4">
        <h3>Add Student</h3>

        <p id="message" class="text-success" style="color: green;"></p>
        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="email" class="form-control mb-2" placeholder="Email">
        <input id="phone" class="form-control mb-3" placeholder="Phone">

        <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
    </div>

    <div class="card p-4">
        <h3>Student List</h3>
        <ul id="studentList" class="list-group"></ul>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
